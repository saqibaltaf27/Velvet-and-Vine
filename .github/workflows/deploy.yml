name: Velvet Vine CI Pipeline

on:
  push:
    branches:
      - main
      - staging

# Add permissions for GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm ci || npm install

    - name: Fix Permissions
      run: |
        chmod +x node_modules/.bin/eslint || true
        chmod +x scripts/*.js || true

    - name: Lint Code
      run: npm run lint

    - name: Optimize Images
      run: npm run optimize

    - name: Build Site
      run: npm run build

    - name: Smoke Test
      run: npm run smoke-test

    - name: Debug Build Output
      run: |
        echo "=== Build Directory Contents ==="
        ls -la _site/
        echo "=== Total Files ==="
        find _site -type f | wc -l

    - name: Deploy to Staging
      if: github.ref == 'refs/heads/staging'
      uses: peaceiris/actions-gh-pages@v4  # Updated to v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        publish_branch: gh-pages-staging
        force_orphan: true
        enable_jekyll: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy staging: ${{ github.event.head_commit.message }}'

    - name: Deploy to Production
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4  # Updated to v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        publish_branch: gh-pages
        force_orphan: true
        enable_jekyll: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Deploy production: ${{ github.event.head_commit.message }}'